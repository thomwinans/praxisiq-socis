services:
  # ─── Data Tier ────────────────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: snapp-dynamodb-local
    ports:
      - "8042:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    networks:
      - snapp-net
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: snapp-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - snapp-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  papercut:
    image: changemakerstudiosus/papercut-smtp:latest
    container_name: snapp-papercut
    ports:
      - "1025:2525"    # Papercut SMTP listens on 2525
      - "8025:8080"
    networks:
      - snapp-net

  # ─── API Gateway (DB-less / declarative) ──────────────────────
  kong:
    image: kong:3.9
    container_name: snapp-kong
    ports:
      - "8000:8000"   # Proxy
      - "8001:8001"   # Admin API
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ../Kong/kong.yml:/etc/kong/kong.yml:ro
    networks:
      - snapp-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Application Services ──────────────────────────────────────
  snapp-auth:
    build:
      context: ../../../
      dockerfile: src/Snapp.Service.Auth/Dockerfile
    container_name: snapp-auth
    ports:
      - "8081:8080"
    depends_on:
      dynamodb-local:
        condition: service_healthy
      papercut:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AWS_ACCESS_KEY_ID: fakeAccessKey
      AWS_SECRET_ACCESS_KEY: fakeSecretKey
      AWS_DEFAULT_REGION: us-east-1
      DynamoDB__ServiceURL: http://dynamodb-local:8000
      Encryption__KeyFilePath: /keys/dev-master.key
      Auth__SigningKeyPath: /keys/jwt-signing.pem
      Auth__Issuer: snapp-auth
      Auth__Audience: snapp-api
      Auth__MagicLinkBaseUrl: http://localhost:5000
      Email__SmtpHost: papercut
      Email__SmtpPort: "2525"
      Email__FromAddress: noreply@snapp.local
    volumes:
      - ./keys:/keys:ro
    networks:
      - snapp-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  snapp-user:
    build:
      context: ../../../
      dockerfile: src/Snapp.Service.User/Dockerfile
    container_name: snapp-user
    ports:
      - "8082:8080"
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AWS_ACCESS_KEY_ID: fakeAccessKey
      AWS_SECRET_ACCESS_KEY: fakeSecretKey
      AWS_DEFAULT_REGION: us-east-1
      DynamoDB__ServiceURL: http://dynamodb-local:8000
      Encryption__KeyFilePath: /keys/dev-master.key
    volumes:
      - ./keys:/keys:ro
    networks:
      - snapp-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  snapp-network:
    build:
      context: ../../../
      dockerfile: src/Snapp.Service.Network/Dockerfile
    container_name: snapp-network
    ports:
      - "8083:8080"
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AWS_ACCESS_KEY_ID: fakeAccessKey
      AWS_SECRET_ACCESS_KEY: fakeSecretKey
      AWS_DEFAULT_REGION: us-east-1
      DynamoDB__ServiceURL: http://dynamodb-local:8000
    networks:
      - snapp-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  snapp-content:
    build:
      context: ../../../
      dockerfile: src/Snapp.Service.Content/Dockerfile
    container_name: snapp-content
    ports:
      - "8084:8080"
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AWS_ACCESS_KEY_ID: fakeAccessKey
      AWS_SECRET_ACCESS_KEY: fakeSecretKey
      AWS_DEFAULT_REGION: us-east-1
      DynamoDB__ServiceURL: http://dynamodb-local:8000
    networks:
      - snapp-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  snapp-intelligence:
    build:
      context: ../../../
      dockerfile: src/Snapp.Service.Intelligence/Dockerfile
    container_name: snapp-intelligence
    ports:
      - "8085:8080"
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AWS_ACCESS_KEY_ID: fakeAccessKey
      AWS_SECRET_ACCESS_KEY: fakeSecretKey
      AWS_DEFAULT_REGION: us-east-1
      DynamoDB__ServiceURL: http://dynamodb-local:8000
    networks:
      - snapp-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  snapp-transaction:
    build:
      context: ../../../
      dockerfile: src/Snapp.Service.Transaction/Dockerfile
    container_name: snapp-transaction
    ports:
      - "8086:8080"
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AWS_ACCESS_KEY_ID: fakeAccessKey
      AWS_SECRET_ACCESS_KEY: fakeSecretKey
      AWS_DEFAULT_REGION: us-east-1
      DynamoDB__ServiceURL: http://dynamodb-local:8000
    networks:
      - snapp-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  snapp-notification:
    build:
      context: ../../../
      dockerfile: src/Snapp.Service.Notification/Dockerfile
    container_name: snapp-notification
    ports:
      - "8087:8080"
    depends_on:
      dynamodb-local:
        condition: service_healthy
      papercut:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AWS_ACCESS_KEY_ID: fakeAccessKey
      AWS_SECRET_ACCESS_KEY: fakeSecretKey
      AWS_DEFAULT_REGION: us-east-1
      DynamoDB__ServiceURL: http://dynamodb-local:8000
      Encryption__KeyFilePath: /keys/dev-master.key
      Email__SmtpHost: papercut
      Email__SmtpPort: "2525"
      Email__FromAddress: noreply@snapp.local
    volumes:
      - ./keys:/keys:ro
    networks:
      - snapp-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  snapp-digest:
    build:
      context: ../../../
      dockerfile: src/Snapp.Service.DigestJob/Dockerfile
    container_name: snapp-digest
    depends_on:
      dynamodb-local:
        condition: service_healthy
      papercut:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: fakeAccessKey
      AWS_SECRET_ACCESS_KEY: fakeSecretKey
      AWS_DEFAULT_REGION: us-east-1
      DynamoDB__ServiceURL: http://dynamodb-local:8000
      Encryption__KeyFilePath: /keys/dev-master.key
      Email__SmtpHost: papercut
      Email__SmtpPort: "2525"
      Email__FromAddress: noreply@snapp.local
    volumes:
      - ./keys:/keys:ro
    networks:
      - snapp-net
    profiles:
      - digest

  snapp-enrichment:
    build:
      context: ../../../
      dockerfile: src/Snapp.Service.Enrichment/Dockerfile
    container_name: snapp-enrichment
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: fakeAccessKey
      AWS_SECRET_ACCESS_KEY: fakeSecretKey
      AWS_DEFAULT_REGION: us-east-1
      DynamoDB__ServiceURL: http://dynamodb-local:8000
      Enrichment__Source: fixture
      Enrichment__Vertical: dental
    networks:
      - snapp-net
    profiles:
      - enrichment

  # ─── Dev Tools ────────────────────────────────────────────────
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: snapp-swagger-ui
    ports:
      - "8090:8080"
    environment:
      URLS: >-
        [
          {"url":"/specs/auth.json","name":"Auth"},
          {"url":"/specs/user.json","name":"User"},
          {"url":"/specs/network.json","name":"Network"},
          {"url":"/specs/content.json","name":"Content"},
          {"url":"/specs/intelligence.json","name":"Intelligence"},
          {"url":"/specs/transaction.json","name":"Transaction"},
          {"url":"/specs/notification.json","name":"Notification"},
          {"url":"/specs/linkedin.json","name":"LinkedIn"}
        ]
    volumes:
      - swagger-specs:/usr/share/nginx/html/specs
    networks:
      - snapp-net

volumes:
  minio-data:
  swagger-specs:

networks:
  snapp-net:
    driver: bridge
